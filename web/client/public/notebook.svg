<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 笔记本封面 -->
  <rect x="20" y="15" width="60" height="70" rx="3" fill="none" stroke="#000000" stroke-width="2"/>
  
  <!-- 笔记本内页 -->
  <rect x="25" y="20" width="50" height="60" rx="2" fill="none" stroke="#000000" stroke-width="1"/>
  
  <!-- 横线（纸张行） -->
  <line x1="30" y1="30" x2="70" y2="30" stroke="#000000" stroke-width="1"/>
  <line x1="30" y1="40" x2="70" y2="40" stroke="#000000" stroke-width="1"/>
  <line x1="30" y1="50" x2="70" y2="50" stroke="#000000" stroke-width="1"/>
  <line x1="30" y1="60" x2="70" y2="60" stroke="#000000" stroke-width="1"/>
  <line x1="30" y1="70" x2="70" y2="70" stroke="#000000" stroke-width="1"/>
  
  <!-- 左侧装订孔 -->
  <circle cx="32" cy="30" r="2" fill="#000000"/>
  <circle cx="32" cy="50" r="2" fill="#000000"/>
  <circle cx="32" cy="70" r="2" fill="#000000"/>
</svg>